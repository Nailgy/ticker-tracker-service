version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ticker-tracker-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ticker-tracker

  # Optional: Redis Commander for debugging
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ticker-tracker-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - ticker-tracker
    profiles:
      - debug

volumes:
  redis-data:

networks:
  ticker-tracker:
    driver: bridge
